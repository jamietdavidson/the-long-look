# Shopify custom app: from-airtable-sync-catalog
# Deploy config (scopes + webhooks): shopify app deploy --allow-updates --no-build
client_id = "8b1b256d022e0466fa53236d06d65f3e"
name = "from-airtable-sync-catalog"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = false

[access_scopes]
scopes = "read_orders,write_files,write_metaobjects,write_products,write_publications"
optional_scopes = ["write_shipping"]

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home" ]

[webhooks]
api_version = "2025-10"

[[webhooks.subscriptions]]
topics = ["orders/create"]
uri = "https://order-sync-production-ceeb.up.railway.app/webhooks/shopify/orders"

[[webhooks.subscriptions]]
topics = ["orders/paid"]
uri = "https://order-sync-production-ceeb.up.railway.app/webhooks/shopify/orders"
