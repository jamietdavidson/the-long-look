[build]
builder = "DOCKERFILE"
dockerfilePath = "services/catalog-sync/Dockerfile"
watchPatterns = [
  "services/catalog-sync/**",
  "scripts/pipedream/airtable-shopify-sync-catalog/**",
  "scripts/pipedream/e2e-pipedream-platform.mjs",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
