name: Deploy catalog sync (Railway)

on:
  push:
    branches: [main, master]
    paths:
      - 'services/catalog-sync/**'
      - 'scripts/pipedream/airtable-shopify-sync-catalog/**'
      - 'scripts/pipedream/e2e-pipedream-platform.mjs'
      - 'railway.toml'
      - '.github/workflows/railway-catalog-sync.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci --detach
