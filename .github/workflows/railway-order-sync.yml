name: Deploy order sync (Railway)

on:
  push:
    branches: [main, master]
    paths:
      - 'services/order-sync/**'
      - 'lib/order-sync/**'
      - 'lib/catalog-sync/**'
      - 'lib/http.mjs'
      - '.github/workflows/railway-order-sync.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy order sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_CONFIG_FILE: /services/order-sync/railway.toml
        run: railway up --ci --detach --service order-sync
